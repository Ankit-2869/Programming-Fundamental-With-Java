<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart Contact Directory</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>
<section id="dialer-section" class="section">
  <div class="dialer-bg-orb orb1"></div>
  <div class="dialer-bg-orb orb2"></div>
  <div class="dialer-wrapper">
    <div class="brand">
      <span class="brand-dot"></span>
      <span>Contact Management System</span>
    </div>
    <div class="search-bar" id="searchBar">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search contacts..." autocomplete="off" />
      <button class="search-clear" id="searchClear" title="Clear">X</button>
    </div>
    <div class="suggestions-box" id="suggestionsBox">
      <div class="suggestion-empty" id="suggestionEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>No contact selected</span>
      </div>
      <div id="suggestionList" class="suggestion-list"></div>
    </div>
    <div class="dialer-display" id="dialerDisplay">
      <span id="dialNumber">-</span>
      <button class="backspace-btn" id="backspaceBtn" title="Delete">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
          <line x1="18" y1="9" x2="13" y2="14"/>
          <line x1="13" y1="9" x2="18" y2="14"/>
        </svg>
      </button>
    </div>
    <div class="dialer-pad">
      <div class="dial-row">
        <button class="dial-key" data-digit="1"><span class="key-num">1</span></button>
        <button class="dial-key" data-digit="2"><span class="key-num">2</span></button>
        <button class="dial-key" data-digit="3"><span class="key-num">3</span></button>
      </div>
      <div class="dial-row">
        <button class="dial-key" data-digit="4"><span class="key-num">4</span></button>
        <button class="dial-key" data-digit="5"><span class="key-num">5</span></button>
        <button class="dial-key" data-digit="6"><span class="key-num">6</span></button>
      </div>
      <div class="dial-row">
        <button class="dial-key" data-digit="7"><span class="key-num">7</span></button>
        <button class="dial-key" data-digit="8"><span class="key-num">8</span></button>
        <button class="dial-key" data-digit="9"><span class="key-num">9</span></button>
      </div>
      <div class="dial-row">
        <button class="dial-key dial-key--ghost" data-digit="*"><span class="key-num">*</span></button>
        <button class="dial-key" data-digit="0"><span class="key-num">0</span></button>
        <button class="dial-key dial-key--ghost" data-digit="#"><span class="key-num">#</span></button>
      </div>
    </div>
    <div class="dialer-actions">
      <button class="btn-add-contact" id="openAddModal" style="width: 100%;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add Contact
      </button>
    </div>
    <div class="scroll-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
      Scroll for Categories
    </div>
  </div>
</section>

<section id="directory-section" class="section">
  <div class="dir-bg-orb orb3"></div>
  <div class="dir-bg-orb orb4"></div>
  <div class="directory-wrapper">
    <div class="dir-tabs">
      <button class="dir-tab active" data-tab="categories" id="tabCategories">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Categories
      </button>
      <button class="dir-tab" data-tab="contacts" id="tabContacts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        All Contacts
      </button>
    </div>
    <div class="dir-swipe-container" id="dirSwipeContainer">
      <div class="dir-panel" id="panelCategories">
        <div class="panel-header">
          <h2>Categories</h2>
          <span class="panel-count" id="catCount">0</span>
        </div>
        <div class="category-grid" id="categoryGrid"></div>
      </div>
      <div class="dir-panel" id="panelContacts">
        <div class="panel-header">
          <h2>All Contacts</h2>
          <span class="panel-count" id="contactCount">0</span>
        </div>
        <div class="contacts-search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="contactsSearch" placeholder="Search contacts..." />
        </div>
        <div class="contacts-list" id="contactsList"></div>
        <div class="contacts-empty" id="contactsEmpty" style="display: none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          <p>No contacts found</p>
        </div>
        <div class="swipe-hint" id="swipeHint">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          Swipe left for categories
        </div>
      </div>
    </div>
    <div class="dir-footer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="14" height="14">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      Ankit kumar | RU-25-10211
    </div>
  </div>
</section>

<div class="modal-overlay" id="addModal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>New Contact</h3>
      <button class="modal-close" onclick="closeAllModals()">✕</button>
    </div>
    <div class="modal-body">
      <div class="avatar-preview" id="avatarPreview">
        <span id="avatarInitials">?</span>
      </div>
      <div class="form-field">
        <label>Full Name</label>
        <input type="text" id="newName" placeholder="Ankit" />
      </div>
      <div class="form-field">
        <label>Phone</label>
        <input type="tel" id="newPhone" placeholder="9234425704" maxlength="10" />
      </div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" id="newEmail" placeholder="ankit.kumar1@rungta.org" />
      </div>
      <div class="form-field">
        <label>Category</label>
        <select id="newCategory">
          <option value="">- Select Category -</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAllModals()">Cancel</button>
      <button class="btn-save" id="saveContact">Save Contact</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal-card modal-card--detail">
    <button class="modal-close" onclick="closeAllModals()">X</button>
    <div class="detail-avatar" id="detailAvatar"></div>
    <h3 id="detailName">Name</h3>
    <p class="detail-category" id="detailCategory"></p>
    <div class="detail-actions">
      <a class="detail-action-btn detail-action-btn--msg" id="detailMsg" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Message
      </a>
    </div>
    <div class="detail-info">
      <div class="detail-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
        <span id="detailPhone">-</span>
      </div>
      <div class="detail-row" id="detailEmailRow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <span id="detailEmail">-</span>
      </div>
    </div>
    <button class="btn-delete" id="deleteContact">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
      Delete Contact
    </button>
  </div>
</div>

<div class="modal-overlay" id="addCatModal">
  <div class="modal-card modal-card--sm">
    <div class="modal-header">
      <h3>New Category</h3>
      <button class="modal-close" onclick="closeAllModals()">X</button>
    </div>
    <div class="modal-body">
      <div class="form-field">
        <label>Category Name</label>
        <input type="text" id="newCatName" placeholder="e.g. Colleagues" />
      </div>
      <div class="form-field">
        <label>Icon Color</label>
        <div class="color-picker" id="colorPicker">
          <button class="color-opt active" data-color="#7c3aed" style="background:#7c3aed"></button>
          <button class="color-opt" data-color="#ec4899" style="background:#ec4899"></button>
          <button class="color-opt" data-color="#3b82f6" style="background:#3b82f6"></button>
          <button class="color-opt" data-color="#10b981" style="background:#10b981"></button>
          <button class="color-opt" data-color="#f59e0b" style="background:#f59e0b"></button>
          <button class="color-opt" data-color="#ef4444" style="background:#ef4444"></button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeAllModals()">Cancel</button>
      <button class="btn-save" id="saveCat">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="catViewModal">
  <div class="modal-card modal-card--list">
    <div class="modal-header">
      <h3 id="catViewTitle">Category</h3>
      <button class="modal-close" onclick="closeAllModals()">X</button>
    </div>
    <div class="modal-body" id="catViewBody"></div>
    <div class="modal-footer">
      <button id="deleteCategoryBtn" class="btn-delete">
        Delete Category
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
</body>
</html>
